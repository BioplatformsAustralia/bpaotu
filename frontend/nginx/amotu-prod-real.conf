# This config is for the "real" production environment, where everything is put behind a reverse proxy (on the same physical machine as the container)
# The TLS configuration is handled by the reverse proxy, so the real production container only listens to http

server {
  listen 80;
  server_name _;

  # Make the guard in the shared include evaluate to "bypass" so nothing is blocked in live
  # (note: maintenance mode implementation has been removed for now, but this is a placeholder for when it is restored)
  set $maintenance_bypass 1;

  # Serve the React frontend (SPA)
  root /usr/share/nginx/html;
  index index.html;

  # Send OAuth endpoints to Django backend
  # (this location block must be before SPA catch-all)
  location /oidc/ {
    proxy_pass http://runserver:9000;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

    # NEVER cache auth endpoints
    add_header Cache-Control "no-store" always;
  }

  # Ingest log is served by Django
  location = /ingest {
    return 301 /ingest/;
  }

  location ^~ /ingest/ {
    proxy_pass http://runserver:9000;

    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

    proxy_http_version 1.1;
    proxy_set_header Connection "";

    add_header Cache-Control "no-store" always;

    # DEBUG: prove nginx matched this block
    add_header X-Debug-Ingest "hit-nginx-ingest-location" always;
  }


  # All app locations (single source of truth)
  include /etc/nginx/snippets/amotu.locations.conf;

  # SPA catch-all
  location / {
    try_files $uri /index.html;
  }

  error_page 404 /404.html;
  location = /404.html {
    internal;
  }
}
