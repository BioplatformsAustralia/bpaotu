server {
  listen 12345; # nginx listens on this port internally, mapped to 80 in prod docker-compose
  server_name _;

  # Make the guard in the shared include evaluate to "bypass" so nothing is blocked in dev
  set $maintenance_bypass 1;

  # Serve the React frontend (SPA)
  root /usr/share/nginx/html;
  index index.html;

  # Send OAuth endpoints to Django backend
  # (this location block must be before SPA catch-all)
  location /oidc/ {
    proxy_pass http://runserver:9000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

    # NEVER cache auth endpoints
    add_header Cache-Control "no-store" always;
  }

  # All app locations (single source of truth)
  include /etc/nginx/snippets/amotu.locations.conf;

  # SPA catch-all
  location / {
    try_files $uri /index.html;
  }

  error_page 404 /404.html;
  location = /404.html {
    internal;
  }
}
