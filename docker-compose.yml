# note that while docker passes the .env file env variables through automatically
# we have kept them in below to be explicit

services:
  db:
    image: postgres:16
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-webapp}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-webapp}
      - POSTGRES_DB=${POSTGRES_DB:-webapp}
    command:
      - "postgres"
      - "-c"
      - "wal_level=minimal"
      - "-c"
      - "max_wal_size=10GB"
      - "-c"
      - "max_wal_senders=0"
    shm_size: 1gb
    ports:
      - "5432:5432"
    volumes:
      - ./data/dev:/data
      - dbdata:/var/lib/postgresql/data/

  cache:
    image: redis:8-alpine
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}"]

volumes:
  dbdata:
