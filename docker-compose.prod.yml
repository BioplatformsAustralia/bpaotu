# note that on server we use the specific version tags
# but for local testing we can use the :prod tag which is built from the prod target in the Dockerfile
# (worker is the same for both prod and dev)

services:
  db:
    # NOTE:
    # in production the db is hosted on a separate server and not in a container
    # but keep this here for local testing of production mode
    image: postgres:16
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-webapp}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-webapp}
      - POSTGRES_DB=${POSTGRES_DB:-webapp}
    command:
      - "postgres"
      - "-c"
      - "wal_level=minimal"
      - "-c"
      - "max_wal_size=10GB"
      - "-c"
      - "max_wal_senders=0"
    shm_size: 1gb
    ports:
      - "5432:5432"
    volumes:
      - dbdata:/var/lib/postgresql/data/

  cache:
    image: redis:8-alpine
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}"]

  runserver:
    image: bioplatformsaustralia/bpaotu:prod
    env_file:
      - .env_prod
    environment:
      - WAIT_FOR_DB=1
      - WAIT_FOR_CACHE=1
    volumes:
      - ./data/prod:/data
    depends_on:
      - db
      - cache

  celeryworker:
    image: bioplatformsaustralia/bpaotu-worker
    env_file:
      - .env_prod
    environment:
      - WAIT_FOR_DB=1
      - WAIT_FOR_CACHE=1
      - PYTHONPATH=/app/bpaotu
      - DJANGO_SETTINGS_MODULE=bpaotu.settings_celery
    volumes:
      - ./data/prod:/data
    depends_on:
      - db
      - cache
      - runserver

  frontend:
    image: bioplatformsaustralia/bpaotu:frontend
    ports:
      # In production mode the frontend is placed behind a reverse proxy.
      # This handles TLS termination and forwards requests to the frontend container.
      #
      # This can be tested locally by runnning a reverse proxy in nginx on the host machine.
      # See: frontend/nginx/amotu.conf and frontend/nginx/reverse-proxy.conf
      - "127.0.0.1:8080:80"
    environment:
      - UPSTREAM_URL=${UPSTREAM_URL:-http://runserver:9000}
    depends_on:
      - runserver
    tmpfs:
      - /tmp

volumes:
  dbdata:
